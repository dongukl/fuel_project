aruco_marker_detector_node:
  ros__parameters:
    rgb_topic: /rgb
    camera_info_topic: /camera_info
    mode_switch_topic: /aruco_detector/mode_switch
    pose_topic: /aruco_detector/pose
    target_locked_topic: /aruco_detector/target_locked
    current_mode_topic: /aruco_detector/current_mode
    debug_image_topic: /aruco_detector/debug_image
    initial_mode: cap

    aruco_dictionary: DICT_4X4_50
    marker_id: 0
    marker_size_m: 0.12

    # visual_test.usda 기준 marker 위치
    # MARKER_CENTER_WORLD = [0.468191, -1.251584,  0.850520]
    # marker frame convention:
    #   x = world +X, y = world -Z(down), z = world +Y(camera/vehicle outward)
    # mode=hole은 Isaac 메인 코드가 apply_mouth_offset=True로 0.05m 안쪽 보정을 하므로
    # marker_to_hole_xyz는 hole center가 아니라 mouth surface 기준 offset이다.
    # marker_to_door_xyz: [0.227924, 0.026725, -0.259677]
    # marker_to_cap_xyz:  [0.230000, 0.050000, -0.240000]
    # marker_to_hole_xyz: [0.230000, 0.209541, -0.216770]
    
    marker_to_door_xyz: [0.227924, 0.259677, -0.028225]
    marker_to_cap_xyz:  [0.230000, 0.240000, -0.051500]
    marker_to_hole_xyz: [0.230000, 0.240000, -0.051500]

    required_stable_frames: 3
    stable_buffer_size: 8
    stable_std_threshold_m: 0.035
    publish_hz: 10.0
    publish_debug: true
    draw_axes: true
